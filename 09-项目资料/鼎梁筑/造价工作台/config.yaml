# 鼎梁筑智能造价工作台 — 配置文件
# 修改后重启程序生效

# 项目信息
project:
  name: "鼎梁筑智能造价工作台"
  version: "1.0.0"
  author: "老高"

# 定额配置
quota:
  system: "新疆2024市政消耗量定额"
  db_path: "./layer2_pricing/quota_db/xinjiang_2024.json"

# 地区与人工单价
region:
  default: "乌鲁木齐"
  category: "一类"          # 一类/二类/三类
  labor_rate: 130           # 元/工日

# 取费费率（锁定）
fee:
  management: 0.28          # 管理费 28% (基数: 人工+机械)
  profit: 0.18              # 利润 18% (基数: 人工+机械)
  regulation: 0.22          # 规费 22% (基数: 人工费)
  vat: 0.09                 # 增值税 9%
  measure: 0.045            # 措施费 ≈4.5%
  safety: 0.025             # 安全文明施工费 ≈2.5%

# OCR配置
ocr:
  engine: "paddleocr"       # paddleocr / pdfplumber
  dpi: 300                  # PDF转图片DPI
  use_gpu: false            # 是否使用GPU

# 输出配置
output:
  default_dir: "./output/"
  template_dir: "./templates/"
  excel_format: "openpyxl"

# 爬虫配置（xj_cost_crawler子工程）
crawler:
  enabled: true
  daily_time: "08:00"
  timezone: "Asia/Shanghai"
  db_path: "./xj_cost_crawler/xj_cost_data/db/xj_cost.db"

# 日志配置
logging:
  level: "INFO"             # DEBUG/INFO/WARNING/ERROR
  file: "./logs/workbench.log"
  max_size_mb: 10
  backup_count: 5
